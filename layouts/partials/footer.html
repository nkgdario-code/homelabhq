<script>
document.querySelectorAll('.newsletter-form').forEach(f=>f.addEventListener('submit',async function(e){
  e.preventDefault();const b=this.querySelector('button');const i=this.querySelector('input');
  const email=i.value.trim();const o=b.textContent;b.disabled=true;b.textContent='Enviando...';
  try{const r=await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  const d=await r.json();if(d.success){this.innerHTML='<p class="ok">✅ ¡Suscrito!</p>'}else{b.textContent=o;b.disabled=false;alert('Error')}}
  catch(e){b.textContent=o;b.disabled=false;alert('Error de conexión')}}));
</script>
