<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}Homelab HQ — Tu servidor en casa{{ else }}{{ .Title }} | HomelabHQ{{ end }}</title>
<meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Guías de homelab, servidores, Docker y self-hosting en español.{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title" content="{{ if .IsHome }}Homelab HQ{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Monta tu servidor en casa con estas guías.{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="HomelabHQ">
<meta property="og:locale" content="es_ES">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}Homelab HQ{{ else }}{{ .Title }}{{ end }}">
<meta property="og:image" content="https://homelabhq.es/images/og-image.png">
<meta name="twitter:image" content="https://homelabhq.es/images/og-image.png">

{{ if not .IsHome }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
{{ end }}

{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {"@type": "Person", "name": "HomelabHQ"},
  "publisher": {"@type": "Organization", "name": "HomelabHQ"},
  "mainEntityOfPage": {"@type": "WebPage", "@id": "{{ .Permalink }}"}
}
</script>
{{ end }}

<link rel="alternate" type="application/rss+xml" title="HomelabHQ RSS" href="/index.xml">

<link rel="stylesheet" href="/css/style.css">
