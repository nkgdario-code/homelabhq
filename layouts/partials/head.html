<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}Homelab HQ — Tu servidor en casa{{ else }}{{ .Title }} | HomelabHQ{{ end }}</title>
<meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Guías de homelab, servidores, Docker y self-hosting en español.{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">

{{ if not .IsHome }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ end }}

{{ if not .IsHome }}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":"{{ .Title }}","description":"{{ .Description }}","datePublished":"{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}","author":{"@type":"Person","name":"HomelabHQ"},"publisher":{"@type":"Organization","name":"HomelabHQ"},"mainEntityOfPage":{"@type":"WebPage","@id":"{{ .Permalink }}"}}
</script>{{ end }}

<link rel="stylesheet" href="/css/style.css">
