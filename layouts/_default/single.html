{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta"><time>{{ .Date.Format "2 de enero de 2006" }}</time></div>
  </header>
  <div class="post-content">{{ .Content }}</div>

  <footer class="post-footer">
    <h3>¿Te sirvió?</h3>
    <p>Comparte este artículo y ayuda a la comunidad homelab.</p>
    <div class="share-buttons">
      <a href="https://wa.me/?text={{ .Title }}%20{{ .Permalink }}" target="_blank" rel="noopener">💬 WhatsApp</a>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}" target="_blank" rel="noopener">💼 LinkedIn</a>
    </div>
  </footer>

  <section class="newsletter-inline">
    <div class="newsletter-card">
      <h3>📩 ¿Quieres más guías como esta?</h3>
      <p>Suscríbete y recibe contenido nuevo cada semana.</p>
      <form class="newsletter-form" action="/api/subscribe" method="POST">
        <input type="email" name="email" placeholder="tu@email.com" required>
        <button type="submit">Suscribirme</button>
      </form>
    </div>
  </section>
</article>
{{ end }}
