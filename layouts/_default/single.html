{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta"><time>{{ .Date.Format "2 de enero de 2006" }}</time></div>
  </header>
  <div class="post-content">{{ .Content }}</div>

  <footer class="post-footer">
    <h3>¿Te sirvio?</h3>
    <p>Deja un comentario abajo y comparte tu experiencia.</p>
  </footer>

  <section class="newsletter-inline">
    <div class="newsletter-card">
      <h3>📩 ¿Quieres mas guias como esta?</h3>
      <p>Suscribete y recibe contenido nuevo cada semana.</p>
      <form class="newsletter-form" action="/api/subscribe" method="POST">
        <input type="email" name="email" placeholder="tu@email.com" required>
        <button type="submit">Suscribirme</button>
      </form>
    </div>
  </section>
</article>
{{ end }}
